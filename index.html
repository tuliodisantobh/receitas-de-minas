<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <header>
        <h1>Delícias de Minas</h1>    
    </header>

    <main>
        <section>
            <h2>Pão de Queijo</h2>
            <img src="img\pao-de-queijo.jpg" alt="Pão de Queijo">
            <button popovertarget="segredo">Ver segredo do Chefe</button>
            <div id="segredo" popover>
                <p>
                    Jamais coloque os ovos com a massa quente, senão eles cozinham e o pão não cresce. 
                </p>
            </div>
        </section>

        <section>
            <h3>Ingredientes:</h3>
            <ul>
                <li>1 ovo inteiro</li>
                <li>1 colher (café) de sal</li>
                <li>1 xícara (chá) de leite</li>
                <li>1 xícara (chá) de queijo minas meia cura ralado</li>
                <li>1 xícara (chá) de polvilho azedo</li>
            </ul>    
        </section>
    </main>

</body>
</html>
